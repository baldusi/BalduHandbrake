name: Release - Build & Publish

on:
  workflow_dispatch:          # Manual trigger from Actions tab
  push:
    tags:
      - 'v*.*.*'              # Auto trigger when you push a version tag

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - adc: ADS1115
            sensor: PRESSURE_TRANSDUCER
          - adc: ADS122C04
            sensor: PRESSURE_TRANSDUCER
          - adc: ADS122C04
            sensor: LOAD_CELL
          - adc: NAU7802
            sensor: LOAD_CELL
          - adc: HX711
            sensor: LOAD_CELL

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32

      - name: Install required libraries
        run: |
          arduino-cli lib install LovyanGFX
          arduino-cli lib install "Adafruit TinyUSB Library"
          arduino-cli lib install RotaryEncoder
          arduino-cli lib install ADS1X15
          arduino-cli lib install "SparkFun ADS122C04 ADC Arduino Library"
          arduino-cli lib install "SparkFun Qwiic Scale NAU7802 Arduino Library"
          arduino-cli lib install HX711

      - name: Build ${{ matrix.adc }} + ${{ matrix.sensor }}
        run: |
          ADC_FLAG="-DADC_${{ matrix.adc }}"
          SENSOR_FLAG="-DSENSOR_${{ matrix.sensor }}"

          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3 \
            --output-dir ./firmware \
            --build-property "build.extra_flags=${ADC_FLAG} ${SENSOR_FLAG}" \
            --build-property "build.psram=enabled" \
            --build-property "build.flash_size=4MB" \
            --warnings all \
            BalduHandbrake.ino

      - name: Rename firmware
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [ -z "$VERSION" ]; then
            VERSION="manual-$(date +%Y%m%d-%H%M)"
          fi
          mv firmware/BalduHandbrake.ino.bin \
             BalduHandbrake-${{ matrix.adc }}-${{ matrix.sensor }}-${VERSION}.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: BalduHandbrake-${{ matrix.adc }}-${{ matrix.sensor }}-*.bin
          draft: false
          prerelease: false
          generate_release_notes: true